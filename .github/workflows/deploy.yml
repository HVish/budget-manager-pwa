name: Deploy to S3 + CloudFront

on:
  workflow_run:
    workflows: ['Release']
    branches: [main, develop]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: >-
    deploy-${{
      github.event_name == 'workflow_run'
      && github.event.workflow_run.head_branch
      || github.ref_name
    }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.environment
        || (github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch == 'main' && 'production' || 'staging'))
        || 'staging'
      }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Sync hashed assets to S3 (immutable, long cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ vars.AWS_S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync remaining files to S3 (no cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} \
            --cache-control "no-cache" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          PATHS="/index.html /sw.js /manifest.json"

          # Include static assets only if they changed (always for manual deploys)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD -- 'public/favicon*' 'public/icons*' 2>/dev/null | grep -q .; then
            PATHS="$PATHS /favicon.svg /icons.svg /icons/*"
          fi

          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths $PATHS
