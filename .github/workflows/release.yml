name: Release & Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-and-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic
        run: |
          pnpm exec semantic-release
          # Extract version from the latest tag (e.g., v1.1.0 -> 1.1.0)
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    if: |
      always() &&
      (needs.release.result == 'success') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.environment
        || (github.ref_name == 'main' && 'production')
        || 'staging'
      }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_APP_VERSION: ${{ needs.release.outputs.version }}
          VITE_API_ORIGIN: ${{ vars.VITE_API_ORIGIN }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Sync hashed assets to S3 (immutable, long cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ vars.AWS_S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync remaining files to S3 (no cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} \
            --cache-control "no-cache" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          PATHS="/index.html /sw.js /manifest.json"

          # Include static assets only if they changed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD -- 'public/favicon*' 'public/icons*' 2>/dev/null | grep -q .; then
            PATHS="$PATHS /favicon.svg /icons.svg /icons/*"
          fi

          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} \
            --paths $PATHS
